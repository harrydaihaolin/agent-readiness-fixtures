name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  list:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.gen.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - id: gen
        run: |
          PAYLOAD=$(python tools/list_fixtures.py | python -c "import json,sys; data=json.load(sys.stdin); print(json.dumps({'fixture': [f['name'] for f in data['fixtures']]}))")
          echo "matrix=$PAYLOAD" >> "$GITHUB_OUTPUT"

  smoke:
    needs: list
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.list.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: make test
      - run: |
          test -d "fixtures/${{ matrix.fixture }}"
          ls "fixtures/${{ matrix.fixture }}"

  self-scan:
    runs-on: ubuntu-latest
    needs: list
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install --upgrade agent-readiness
      # Fixtures intentionally contain failure samples; we use a lower
      # bar than the 95 baseline used in product repos.
      - run: agent-readiness scan . --fail-below 60
